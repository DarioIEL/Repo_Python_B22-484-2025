<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prima Lezione in JS</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <!-- Il file di JS potrebbe anche essere collegato qui in alto, al fondo della head ma a Google non piace per nulla. -->
</head>
<body>
    <h1>Prima Lezione in JS</h1>    
    
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Officiis, porro expedita distinctio eius ab blanditiis labore voluptates non mollitia magnam laboriosam fugit atque perferendis eos dolore cupiditate, aliquid fugiat praesentium?</p>
    
    <div class="container">
        <div class="row"></div>
    </div>
    
    <!-- Lo script in Js va SEMPRE collegato al fondo del body. ATT: se ci sono altri script, il nostro script personale va collegato in ultima posizione. Questo perché abbiamo un maggior controllo su ciò che accade e su cosa dovrà accadere una volta eseguiti gli script "accessori" -->
    <script src="./js/script.js"></script>

    <!-- Si può anche utilizzare lo script "in linea" ma è sconsigliato  -->
    <script>
        let nomeAutore = "Dario";
        let cognomeAutore = "Mennillo";
        console.log(nomeAutore + " " + cognomeAutore);
        
    </script>

</body>
</html>
